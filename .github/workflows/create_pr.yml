name: Create PR on Tag

on:
    push:
        tags:
            - "v*.*.*"

jobs:
    create-pr:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Generate PR body with GPT
              id: pr_body
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
              run: |
                  TAG=${GITHUB_REF#refs/tags/}
                  PREV_TAG=$(git tag --sort=-creatordate | sed -n '2p')

                  if [ -z "$PREV_TAG" ]; then
                    DIFF=$(git log --oneline -20)
                  else
                    DIFF=$(git log --oneline ${PREV_TAG}..${TAG})
                  fi

                  RESPONSE=$(curl -s https://api.openai.com/v1/chat/completions \
                    -H "Content-Type: application/json" \
                    -H "Authorization: Bearer $OPENAI_API_KEY" \
                    -d "{
                      \"model\": \"gpt-4o\",
                      \"messages\": [{
                        \"role\": \"user\",
                        \"content\": \"아래 커밋 목록을 기반으로 GitHub PR 본문을 한국어로 자동 생성해주세요.\n형식은 자유롭게 하되 이모지를 활용하고, 변경사항 요약과 주요 내용을 포함하세요.\n\n커밋 목록:\n${DIFF}\"
                      }],
                      \"max_tokens\": 1000
                    }")

                  BODY=$(echo $RESPONSE | python3 -c "import sys,json; print(json.load(sys.stdin)['choices'][0]['message']['content'])")
                  echo "BODY<<EOF" >> $GITHUB_OUTPUT
                  echo "$BODY" >> $GITHUB_OUTPUT
                  echo "EOF" >> $GITHUB_OUTPUT

            - name: Create PR to main
              uses: actions/github-script@v7
              with:
                  script: |
                      const tag = context.ref.replace('refs/tags/', '');
                      const body = `${{ steps.pr_body.outputs.BODY }}`;

                      await github.rest.pulls.create({
                        owner: context.repo.owner,
                        repo: context.repo.repo,
                        title: `🚀 Release ${tag}`,
                        head: 'release',
                        base: 'main',
                        body: body,
                      });
