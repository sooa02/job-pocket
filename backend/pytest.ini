# ==========================================
# pytest.ini — Job-Pocket 테스트 설정
# Docker container 기준: /app
# ==========================================

[pytest]
testpaths = tests

python_files = test_*.py
python_classes = Test*
python_functions = test_*

pythonpath = .

addopts =
    -v
    --tb=short
    --strict-markers
    --disable-warnings
    -ra

markers =
    integration: 통합 테스트 (실제 DB 사용)
    api: API 엔드포인트 테스트
    service: 서비스 계층 테스트 (비즈니스 로직)
    auth: 인증(Auth) 관련 테스트
    slow: 실행 시간이 긴 테스트 (1초 이상)
    retriever: Retriever 관련 테스트 (FAISS 인덱스 필요)
    mock_llm: LLM 호출이 mocked된 테스트
    requires_llm: 실제 LLM API 호출이 필요한 테스트 (eval용)

minversion = 8.0

filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning:streamlit.*

log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S